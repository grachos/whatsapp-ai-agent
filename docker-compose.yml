version: '3.9'

services:
  agent:
    build: .
    container_name: whatsapp-ai-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./logs:/app/logs
      - ./auth:/app/auth
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
